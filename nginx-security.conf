# NGINX SECURITY CONFIGURATION
# Include this file in your server block: include /path/to/www/billing-wifi/nginx-security.conf;

# 1. Block access to Sensitive Config File
location = /config.php {
    deny all;
    return 404;
}

# 2. Block access to SQL Dumps (Database backups)
location ~ \.sql$ {
    deny all;
    return 404;
}

# 3. Block access to hidden files (.env, .git, .htaccess)
location ~ /\. {
    deny all;
    return 404;
}

# 4. Block access to log files
location ~ \.log$ {
    deny all;
    return 404;
}

# 5. Prevent directory listing (Optional, if not already in main config)
autoindex off;

# 6. Block PHP execution in upload directories
location ~* ^/uploads/.*\.php$ {
    deny all;
    return 404;
}
